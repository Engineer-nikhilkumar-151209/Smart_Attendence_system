<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Web OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .window {
            position: absolute;
            min-width: 300px;
            min-height: 200px;
            resize: both;
            overflow: hidden;
            transition: opacity 0.2s;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-white">

    <div id="desktop" class="relative w-full h-[calc(100vh-56px)] p-6">
        <div class="flex flex-col gap-8 items-start">
            <div onclick="openApp('vscode')" class="group flex flex-col items-center cursor-pointer w-20">
                <div class="p-4 rounded-2xl glass group-hover:bg-white/10 transition-all">
                    <i class="bi bi-code-slash text-blue-400 text-3xl"></i>
                </div>
                <span class="text-xs mt-2 font-medium">VS Code</span>
            </div>

            <div onclick="openApp('blender')" class="group flex flex-col items-center cursor-pointer w-20">
                <div class="p-4 rounded-2xl glass group-hover:bg-white/10 transition-all">
                    <i class="bi bi-box text-orange-400 text-3xl"></i>
                </div>
                <span class="text-xs mt-2 font-medium">Blender</span>
            </div>

            <div onclick="openApp('drive')" class="group flex flex-col items-center cursor-pointer w-20">
                <div class="p-4 rounded-2xl glass group-hover:bg-white/10 transition-all">
                    <i class="bi bi-cloud-check text-emerald-400 text-3xl"></i>
                </div>
                <span class="text-xs mt-2 font-medium">My Drive</span>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full h-14 glass flex items-center justify-between px-6 border-t border-white/10 z-50">
        <div class="flex items-center gap-6">
            <i class="bi bi-grid-fill text-2xl cursor-pointer hover:text-purple-400"></i>
            <div id="taskbar-apps" class="flex gap-2"></div>
        </div>
        
        <div class="flex items-center gap-4 text-sm font-mono">
            <i class="bi bi-qr-code-scan cursor-pointer" onclick="openApp('qr')"></i>
            <span id="clock">00:00 AM</span>
        </div>
    </div>

    <script>
        // Clock Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // Simple Window Manager
        function openApp(id) {
            if (document.getElementById(`win-${id}`)) return;

            const win = document.createElement('div');
            win.id = `win-${id}`;
            win.className = 'window glass rounded-xl shadow-2xl z-10';
            win.style.width = '800px';
            win.style.height = '500px';
            win.style.top = '100px';
            win.style.left = '200px';

            let content = '';
            if(id === 'vscode') content = `<iframe src="https://vscode.dev" class="w-full h-full border-0"></iframe>`;
            if(id === 'blender') content = `<div class="p-10 text-center"><h3>Connect to GPU Cloud Instance</h3><p class="text-slate-400 mt-4">Run Blender via WebRTC/Guacamole for GPU acceleration.</p></div>`;
            if(id === 'qr') content = `<div class="p-10 flex flex-col items-center"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(window.location.href)}" class="rounded-lg mb-4" /> <p>Scan to mirror session</p></div>`;
            if(id === 'drive') content = `<div class="p-6"> <h2 class="text-xl font-bold mb-4">Google Drive (15GB)</h2> <div class="grid grid-cols-4 gap-4 text-center"> <div class="p-4 bg-white/5 rounded-lg"><i class="bi bi-file-earmark-pdf text-red-400"></i><p class="text-xs mt-2">Resume.pdf</p></div> </div> </div>`;

            win.innerHTML = `
                <div class="flex items-center justify-between p-3 border-b border-white/10 cursor-move bg-black/20 rounded-t-xl">
                    <span class="text-sm font-bold uppercase tracking-widest">${id}</span>
                    <i class="bi bi-x-lg cursor-pointer hover:text-red-400" onclick="document.getElementById('win-${id}').remove()"></i>
                </div>
                <div class="h-[calc(100%-45px)] w-full overflow-hidden">${content}</div>
            `;
            
            document.getElementById('desktop').appendChild(win);
            makeDraggable(win);
        }

        function makeDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.querySelector('.cursor-move').onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                el.style.zIndex = 100;
            }

            function elementDrag(e) {
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }
    </script>
</body>
</html>
